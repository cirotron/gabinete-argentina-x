<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Seguimiento del gabinete de gobierno argentino y sus grupos de poder en X (Twitter).">
    <title>Gabinete de Gobierno de Argentina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Mapa de Poder Político Argentino 🇦🇷</h1>
    <p class="subtitulo">Gabinete, bloques legislativos, aliados, opositores y actores clave — con sus cuentas en X</p>

    <div id="grupos-container">
        <!-- Grupos se renderizan con JS -->
    </div>

    <script>
        fetch('gabinete.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('grupos-container');

                data.grupos.forEach(grupo => {
                    // Sección del grupo
                    const section = document.createElement('section');
                    section.className = 'grupo';
                    section.setAttribute('data-id', grupo.id);

                    // Header del grupo
                    const header = document.createElement('div');
                    header.className = 'grupo-header';
                    header.style.borderLeftColor = grupo.color;
                    header.innerHTML = `
                        <h2 class="grupo-nombre">${grupo.nombre}</h2>
                        <p class="grupo-descripcion">${grupo.descripcion}</p>
                    `;
                    section.appendChild(header);

                    // Tabla de miembros
                    const table = document.createElement('table');
                    table.innerHTML = `
                        <thead>
                            <tr>
                                <th>Cargo</th>
                                <th>Nombre</th>
                                <th>Cuenta de X</th>
                            </tr>
                        </thead>
                    `;
                    const tbody = document.createElement('tbody');

                    grupo.miembros.forEach(persona => {
                        const tr = document.createElement('tr');
                        let cuentaCell = `<span class="sin-cuenta">—</span>`;
                        if (persona.x && persona.link) {
                            if (persona.es_cuenta_institucional) {
                                cuentaCell = `<a href="${persona.link}" target="_blank" rel="noopener" class="cuenta-institucional" title="Cuenta institucional del organismo que representa">🏛️ ${persona.x}</a>`;
                            } else {
                                cuentaCell = `<a href="${persona.link}" target="_blank" rel="noopener">${persona.x}</a>`;
                            }
                        }

                        tr.innerHTML = `
                            <td>${persona.cargo}</td>
                            <td>${persona.nombre}</td>
                            <td>${cuentaCell}</td>
                        `;
                        tbody.appendChild(tr);
                    });

                    table.appendChild(tbody);
                    section.appendChild(table);
                    container.appendChild(section);
                });
            })
            .catch(error => console.error('Error cargando el JSON:', error));
    </script>
</body>
</html>
